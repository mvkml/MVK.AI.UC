<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ai_hr — Database Explorer</title>
<style>
  :root {
    --bg: #0a0e2a; --card: #0d1240; --purple: #7C6FFF; --blue: #4fc3f7;
    --green: #68d391; --orange: #f6ad55; --red: #fc8181; --white: #ffffff;
    --muted: #a0aec0; --border: rgba(124,111,255,0.15);
    --gradient: linear-gradient(135deg, #7C6FFF, #4fc3f7);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--white); display: flex; }

  /* ── LEFT PANE: Databases ── */
  .sidebar { width: 240px; flex-shrink: 0; min-height: 100vh; background: var(--card); border-right: 1px solid var(--border); padding: 24px 16px; }
  .sidebar .brand { margin-bottom: 8px; padding: 0 8px; }
  .sidebar .brand h1 { margin: 0; font-size: 16px; }
  .sidebar .brand p  { margin: 2px 0 0; font-size: 11px; color: var(--muted); }
  .home-btn {
    display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none;
    color: var(--muted); padding: 8px 12px; margin-bottom: 16px; border-radius: 10px;
    font-size: 12px; font-weight: 600; cursor: pointer; text-align: left;
  }
  .home-btn:hover { background: rgba(124,111,255,0.08); color: var(--white); }
  .nav-section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 16px 8px 8px; }
  .db-btn {
    display: flex; align-items: center; gap: 10px; width: 100%; background: none; border: none;
    color: var(--muted); padding: 10px 12px; border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: left; transition: all .15s;
  }
  .db-btn:hover  { background: rgba(124,111,255,0.08); color: var(--white); }
  .db-btn.active { background: rgba(124,111,255,0.18); color: var(--white); }
  .db-btn .status-dot { width: 7px; height: 7px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
  .db-btn .status-dot.live { background: var(--green); }
  .db-btn .status-dot.off  { background: var(--muted); opacity: .4; }

  /* ── MAIN AREA ── */
  .main { flex: 1; padding: 32px 40px; overflow-y: auto; }
  header { margin-bottom: 24px; }
  header h2 { margin: 0 0 6px; font-size: 20px; }
  header p  { margin: 0; color: var(--muted); font-size: 13px; }

  .table-list { display: flex; flex-direction: column; gap: 14px; }
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .table-card .tc-head {
    display: flex; align-items: center; gap: 10px; padding: 14px 18px;
    cursor: pointer; transition: background .15s;
  }
  .table-card .tc-head:hover { background: rgba(124,111,255,0.06); }
  .table-card .tc-icon { font-size: 16px; }
  .table-card .tc-name { font-size: 14px; font-weight: 700; }
  .table-card .tc-rows { margin-left: auto; font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.04); padding: 2px 10px; border-radius: 20px; }
  .table-card .tc-caret { font-size: 11px; color: var(--muted); transition: transform .2s; }
  .table-card.open .tc-caret { transform: rotate(90deg); }
  .table-card .tc-cols { display: none; border-top: 1px solid var(--border); }
  .table-card.open .tc-cols { display: block; }

  .col-row {
    display: grid; grid-template-columns: 1.4fr 1fr 0.6fr 0.6fr; gap: 10px;
    padding: 8px 18px; font-size: 12px; align-items: center;
  }
  .col-row.head { color: var(--muted); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: .4px; background: rgba(124,111,255,0.05); }
  .col-row:not(.head):hover { background: rgba(124,111,255,0.03); }
  .col-name { color: var(--white); font-weight: 600; }
  .col-type { color: var(--blue); }
  .col-tag { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; width: fit-content; }
  .col-tag.pk { background: rgba(124,111,255,0.18); color: var(--purple); }
  .col-tag.fk { background: rgba(79,195,247,0.15); color: var(--blue); }
  .col-tag.uq { background: rgba(246,173,85,0.15); color: var(--orange); }

  .sp-empty { color: var(--muted); font-style: italic; font-size: 13px; padding: 16px 18px; }
  .section-label { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 28px 0 12px; }
  .not-started { color: var(--muted); font-style: italic; font-size: 14px; }
</style>
</head>
<body>

  <nav class="sidebar">
    <div class="brand">
      <h1>🗄️ hr_data_source</h1>
      <p>Database Explorer</p>
    </div>
    <button class="home-btn" onclick="goHome()">🏠 Home</button>

    <p class="nav-section-label">Databases</p>
    <button class="db-btn active" data-db="AI_HR">AI_HR <span class="status-dot live"></span></button>
    <button class="db-btn" data-db="hr_pg">hr_pg <span class="status-dot off"></span></button>
    <button class="db-btn" data-db="hr_cosmos">hr_cosmos <span class="status-dot off"></span></button>
  </nav>

  <main class="main" id="main-area"></main>

<script src="db_data.js"></script>
<script>
  function goHome() {
    if (window.history.length > 1) window.history.back();
    else window.location.href = 'index.html';
  }

  const mainArea = document.getElementById('main-area');

  function renderDb(key) {
    const db = dbDetails[key];
    if (!db) {
      mainArea.innerHTML = `<header><h2>${key}</h2></header><p class="not-started">Not started yet — no tables.</p>`;
      return;
    }
    mainArea.innerHTML = `
      <header>
        <h2>🗄️ ${key} <span style="font-size:13px;color:var(--muted);font-weight:400;">(${db.connection})</span></h2>
        <p>${db.tables.length} table(s), ${db.storedProcedures.length} stored procedure(s)</p>
      </header>

      <p class="section-label">Tables</p>
      <div class="table-list">
        ${db.tables.map(t => `
          <div class="table-card" data-table="${t.name}">
            <div class="tc-head" onclick="this.parentElement.classList.toggle('open')">
              <span class="tc-icon">📋</span>
              <span class="tc-name">${t.name}</span>
              <span class="tc-rows">${t.rowCount} row${t.rowCount === 1 ? '' : 's'}</span>
              <span class="tc-caret">▶</span>
            </div>
            <div class="tc-cols">
              <div class="col-row head"><span>Column</span><span>Type</span><span>Nullable</span><span>Key</span></div>
              ${t.columns.map(c => `
                <div class="col-row">
                  <span class="col-name">${c.name}</span>
                  <span class="col-type">${c.type}</span>
                  <span>${c.nullable ? 'Yes' : 'No'}</span>
                  <span>${c.key ? `<span class="col-tag ${c.key}">${c.key.toUpperCase()}</span>` : ''}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>

      <p class="section-label">Stored Procedures</p>
      ${db.storedProcedures.length
        ? `<div class="table-list">${db.storedProcedures.map(sp => `<div class="table-card"><div class="tc-head"><span class="tc-icon">⚙️</span><span class="tc-name">${sp}</span></div></div>`).join('')}</div>`
        : `<p class="sp-empty">None yet.</p>`}
    `;
  }

  document.querySelectorAll('.db-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.db-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDb(btn.dataset.db);
    });
  });

  renderDb('AI_HR');
</script>

</body>
</html>
